<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB STATS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div id="sidebar-overlay" onclick="closeSidebar()"></div>

    <div id="layout">

        <!-- ── 사이드바 ── -->
        <div id="sidebar">
            <div class="sb-head">
                <div class="sb-logo" onclick="showStandings()">⚾ MLB STATS</div>
                <div class="sb-search-wrap">
                    <span class="sb-search-ico" style="display:flex;align-items:center;">
                        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
                            <line x1="10.5" y1="10.5" x2="14.5" y2="14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </span>
                    <input type="text" placeholder="팀 검색..." oninput="filterTeams(this.value)">
                </div>
            </div>

            <!-- 사이드바 네비게이션 -->
            <div class="sb-nav">
                <button class="sb-nav-btn active" data-nav="standings"  onclick="showStandings()">순위표</button>
                <button class="sb-nav-btn"         data-nav="leaderboard" onclick="showLeaderboard()">리더보드</button>
                <button class="sb-nav-btn"         data-nav="compare"    onclick="showCompare()">팀 비교</button>
            </div>
            <div style="padding: 6px 14px; border-bottom: 1px solid var(--border);">
                <button class="sb-nav-btn" data-nav="favorites" onclick="showFavorites()" style="width:100%;">★ 즐겨찾기</button>
            </div>

            <div class="sb-body">
                <div class="sb-league">American League</div>
                <div id="al-list"></div>
                <div class="sb-league" style="margin-top:8px;">National League</div>
                <div id="nl-list"></div>
            </div>
        </div>

        <!-- ── 메인 영역 ── -->
        <div id="main-content">

            <!-- 상단 헤더 -->
            <div id="top-header">
                <div style="display:flex; align-items:center;">
                    <button id="hamburger" onclick="toggleSidebar()">☰</button>
                    <span class="hd-title" onclick="showStandings()">⚾ MLB STATS</span>
                </div>
                <div style="display:flex; align-items:center; gap:12px;">
                    <div id="search-wrapper">
                        <div class="search-box">
                            <span class="search-ico">
                                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
                                    <line x1="10.5" y1="10.5" x2="14.5" y2="14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                </svg>
                            </span>
                            <input type="text" id="player-search"
                                placeholder="선수 검색..."
                                autocomplete="off"
                                oninput="onSearchInput(this.value)"
                                onkeyup="if(event.keyCode===13){closeDropdown();searchAndGo();}">
                        </div>
                        <div id="search-dropdown"></div>
                    </div>
                    <button class="search-btn" onclick="closeDropdown();searchAndGo()">Search</button>
                </div>
            </div>

            <!-- 다크/라이트 테마 토글 -->
            <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="테마 전환">
                <svg id="theme-icon-dark" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/>
                    <line x1="12" y1="2"  x2="12" y2="4"  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="12" y1="20" x2="12" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="2"  y1="12" x2="4"  y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="20" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="4.93"  y1="4.93"  x2="6.34"  y2="6.34"  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="17.66" y1="17.66" x2="19.07" y2="19.07" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="4.93"  y1="19.07" x2="6.34"  y2="17.66" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="17.66" y1="6.34"  x2="19.07" y2="4.93"  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <svg id="theme-icon-light" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none;">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>

            <!-- 상단 경기 스코어 배너 -->
            <div id="score-banner-container">
                <button class="banner-nav-btn" id="banner-prev" onclick="shiftBanner(-1)">‹</button>
                <div id="score-banner">
                    <span style="color:var(--text-3); font-size:0.75rem;">경기 정보 로딩 중...</span>
                </div>
                <button class="banner-nav-btn" id="banner-next" onclick="shiftBanner(1)" disabled>›</button>
            </div>

            <!-- 콘텐츠 - JS가 여기 채워넣음 -->
            <div id="content-display">
                <div class="standings-grid">
                    <div class="skel" style="height:220px;"></div>
                    <div class="skel" style="height:220px;"></div>
                    <div class="skel" style="height:220px;"></div>
                    <div class="skel" style="height:220px;"></div>
                    <div class="skel" style="height:220px;"></div>
                    <div class="skel" style="height:220px;"></div>
                </div>
            </div>

        </div>
    </div>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
