<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB 데이터 센터</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 부드러운 화면 전환 효과 */
        #main-content {
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            transition: 0.2s;
        }
        /* 부드러운 화면 전환 효과 */
        #main-content {
            transition: all 0.3s ease;
        }
        .hero-img {
        width: 160px;
        height: auto; 
        min-height: 160px;
        border-radius: 12px;
        object-fit: contain; 
        background: #111;
        border: 2px solid var(--border);
        flex-shrink: 0;
        }
    </style>
</head>
<body style="background-color: #f8f9fa;">

    <div style="display: flex;">

        <div id="sidebar" style="width: 300px; height: 100vh; background-color: #212529; color: white; position: fixed; overflow-y: auto; padding: 20px;">
            <h4 class="text-center mb-4" style="color: #ffc107;">⚾ MLB TEAMS</h4>
            
            <div style="margin-bottom: 30px;">
                <p style="font-size: 0.8rem; color: #6c757d; border-bottom: 1px solid #495057; padding-bottom: 5px; text-transform: uppercase;">American League</p>
                <div id="al-list"></div>
            </div>

            <div>
                <p style="font-size: 0.8rem; color: #6c757d; border-bottom: 1px solid #495057; padding-bottom: 5px; text-transform: uppercase;">National League</p>
                <div id="nl-list"></div>
            </div>
        </div>

        <div id="main-content" style="margin-left: 300px; flex-grow: 1; min-height: 100vh; padding: 50px; background-color: #ffffff;">
            <div id="content-display" class="text-center" style="margin-top: 150px;">
                <h1 style="font-size: 5rem;">⚾</h1>
                <h2 class="text-secondary">팀을 선택해 주세요</h2>
                <p class="text-muted">왼쪽 리스트에서 팀을 클릭하면 실시간 로스터가 표시됩니다.</p>
            </div>
        </div>

    </div>

    <script>
        // 전역 변수: 뒤로가기 기능을 위해 현재 팀 ID 저장
        let currentTeamId = null;

        // [초기화] 페이지 로드 시 팀 목록 가져오기
        document.addEventListener('DOMContentLoaded', function() {
            fetch('/api/teams')
                .then(response => response.json())
                .then(data => {
                    const createItem = (team) => `
                        <div onclick="showTeamDetail(${team.id})" 
                             style="padding: 10px; cursor: pointer; border-radius: 4px; display: flex; justify-content: space-between; transition: 0.3s;"
                             onmouseover="this.style.backgroundColor='#343a40'" 
                             onmouseout="this.style.backgroundColor='transparent'">
                            <span style="color: #20c997; font-weight: bold;">${team.abbreviation}</span>
                            <span>${team.name}</span>
                        </div>
                    `;
                    document.getElementById('al-list').innerHTML = data.american.map(createItem).join('');
                    document.getElementById('nl-list').innerHTML = data.national.map(createItem).join('');
                });
        });

        // [기능 1] 팀 클릭 시 로스터 출력
        function showTeamDetail(teamId) {
            currentTeamId = teamId;
            const display = document.getElementById('main-content');
            display.innerHTML = '<div class="text-center" style="margin-top: 100px;"><div class="spinner-border text-primary"></div><p class="mt-2">로스터 로딩 중...</p></div>';

            fetch(`/api/roster/${teamId}`)
                .then(response => response.json())
                .then(data => {
                    let tableRows = data.roster.map(item => `
                        <tr onclick="showPlayerStats(${item.person.id})" 
                            style="cursor: pointer; transition: 0.2s;" 
                            onmouseover="this.style.backgroundColor='#f1f3f5'" 
                            onmouseout="this.style.backgroundColor='transparent'">
                            <td>${item.jerseyNumber || '-'}</td>
                            <td style="font-weight: bold;">${item.person.fullName}</td>
                            <td>${item.position.name}</td>
                            <td><span class="badge bg-light text-dark border">${item.position.type}</span></td>
                        </tr>
                    `).join('');

                    display.innerHTML = `
                        <div class="container-fluid">
                            <h2 class="mb-4 text-center fw-bold">📋 Active Roster</h2>
                            <table class="table table-hover mt-3">
                                <thead class="table-dark">
                                    <tr><th>#</th><th>Name</th><th>Position</th><th>Type</th></tr>
                                </thead>
                                <tbody>${tableRows}</tbody>
                            </table>
                        </div>
                    `;
                    window.scrollTo(0, 0);
                });
        }

        // [기능 2] 선수 클릭 시 상세 정보 및 스탯 출력
        function showPlayerStats(playerId) {
            const display = document.getElementById('main-content');
            display.innerHTML = '<div class="text-center" style="margin-top: 100px;"><div class="spinner-border text-success"></div><p class="mt-2">데이터 분석 중...</p></div>';

            fetch(`/api/player/${playerId}`)
                .then(response => response.json())
                .then(data => {
                    const info = data.info;
                    const stats = data.stats;
                    // 서버에서 보낸 imageUrl을 사용하거나, 없으면 기본 API 경로를 생성합니다.
                    const playerImg = data.imageUrl || `https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_213,q_auto:best/v1/people/${playerId}/headshot/67/current`;

                    const statCards = stats.map(s => `
                        <div class="col-6 col-md-3">
                            <div class="p-3 border rounded shadow-sm bg-light mb-3 stat-card">
                                <div class="text-muted small fw-bold">${s.label}</div>
                                <div class="h4 mb-0 fw-bold text-dark">${s.val}</div>
                            </div>
                        </div>
                    `).join('');

                    display.innerHTML = `
                        <div class="container-fluid">
                            <button class="btn btn-sm btn-outline-secondary mb-4" onclick="showTeamDetail(${currentTeamId})">← 목록으로</button>
                            
                            <div class="card shadow border-0" style="border-radius: 20px; overflow: hidden;">
                                <div class="card-header bg-dark text-white p-4" style="border-bottom: 5px solid #ffc107;">
                                    <div class="d-flex align-items-center gap-4 flex-wrap">
                                        <div style="width: 140px; height: 140px; flex-shrink: 0; background: #111; border-radius: 15px; overflow: hidden; border: 3px solid #fff;">
                                            <img src="${playerImg}" 
                                                alt="${info.fullName}"
                                                onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22160%22 height=%22160%22><rect fill=%22%23161b22%22 width=%22160%22 height=%22160%22/><text fill=%22%237d8590%22 font-size=%2248%22 x=%2280%22 y=%2295%22 text-anchor=%22middle%22>?</text></svg>'"
                                                style="width: 100%; height: 100%; object-fit: cover; object-position: top center;">
                                        </div>
                                        
                                        <div>
                                            <h1 class="display-5 fw-bold mb-1">${info.fullName}</h1>
                                            <div class="d-flex align-items-center gap-2">
                                                <span class="badge bg-warning text-dark" style="font-size: 1.2rem;">#${info.primaryNumber || '--'}</span>
                                                <span class="h4 mb-0 text-info">${info.primaryPosition.name}</span>
                                            </div>
                                            <p class="text-secondary mt-2 mb-0">${info.birthCity || ''}, ${info.birthCountry || ''}</p>
                                        </div>
                                    </div>
                                </div>

                                <div class="card-body p-5">
                                    <h5 class="mb-4 fw-bold" style="border-left: 5px solid #198754; padding-left: 15px; color: #198754;">
                                        📊 2026 Season Performance
                                    </h5>
                                    <div class="row text-center">
                                        ${statCards}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    window.scrollTo(0, 0);
                })
                .catch(err => {
                    display.innerHTML = `<div class="alert alert-danger">에러 발생: ${err.message}</div>`;
                });
        }
        async function loadPlayerDetail(playerId) {
            const res = await fetch(`/api/player/${playerId}`);
            const p = await res.json();

            // 이미지를 띄우는 HTML 부분
            const playerHeroHtml = `
                <div class="player-hero">
                <img class="hero-img" src="${p.imageUrl}" alt="${p.fullName}"
                    /* 2. 이미지 로드 실패 시 물음표 아이콘(SVG)을 출력하는 코드 */
                    onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22160%22 height=%22160%22><rect fill=%22%23161b22%22 width=%22160%22 height=%22160%22/><text fill=%22%237d8590%22 font-size=%2248%22 x=%2280%22 y=%2295%22 text-anchor=%22middle%22>?</text></svg>'">
                
                <div class="hero-info">
                    <h1>${p.fullName}</h1>
                    </div>
                </div>
            `;
            
            document.getElementById('detailView').innerHTML = playerHeroHtml;
        }
    </script>
</body>
</html>
