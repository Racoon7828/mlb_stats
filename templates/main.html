<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB DATA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 부드러운 화면 전환 효과 */
        #main-content {
            transition: all 0.3s ease;
            background-color: #1a1d20; /* 메인 배경색 */
            color: #e9ecef; /* 기본 텍스트색 */
        }

        /* 사이드바 스타일 강화 */
        #sidebar {
            border-right: 1px solid #343a40;
        }

        .player-col {
            width: 16.666% !important; /* 100/6 */
            padding: 8px !important;
        }

        .player-card {
            background-color: #212529 !important; /* 카드 배경색 명확화 */
        }
        /* 마우스 호버 시 살짝만 커지게 조정 */
        .player-card:hover {
            transform: scale(1.03) !important;
            border-color: #ffc107 !important;
            z-index: 10;
        }
        /* 화면이 좁아질 때 3명씩 */
        @media (max-width: 1200px) {
            .player-col {
                width: 33.333% !important;
            }
        }

        /* 2명씩 */
        @media (max-width: 576px) {
            .player-col {
                width: 50% !important;
            }
        }
    </style>

    <body style="background-color: #121416;">

        <div style="display: flex;">
            <div id="sidebar" style="width: 300px; height: 100vh; background-color: #121416; color: white; position: fixed; overflow-y: auto; padding: 20px;">
                <h4 class="text-center mb-4" style="color: #ffc107;">⚾ MLB TEAMS</h4>
                
                <div style="margin-bottom: 30px;">
                    <p style="font-size: 0.8rem; color: white; border-bottom: 1px solid white; padding-bottom: 5px; text-transform: uppercase;">American League</p>
                    <div id="al-list"></div> </div>

                <div>
                    <p style="font-size: 0.8rem; color: white; border-bottom: 1px solid white; padding-bottom: 5px; text-transform: uppercase;">National League</p>
                    <div id="nl-list"></div> </div>
            </div>

            <div id="main-content" style="margin-left: 300px; flex-grow: 1; min-height: 100vh; display: flex; flex-direction: column;">
    
                <div id="top-header" class="d-flex justify-content-between align-items-center px-4 py-3" 
                    style="position: sticky; top: 0; background-color: #121416; z-index: 1000; border-bottom: 1px solid #343a40;">
                    
                    <h2 class="fw-bold m-0 text-warning" style="letter-spacing: 1px; cursor: pointer;" onclick="location.reload()">
                        MLB 선수 정보
                    </h2>

                    <div class="input-group" style="width: 350px;">
                        <input type="text" id="player-search" class="form-control bg-dark text-white border-secondary" 
                            placeholder="Player Name..." onkeyup="if(window.event.keyCode==13){searchAndGo()}">
                        <button onclick="searchAndGo()" class="btn btn-warning fw-bold">Search</button>
                    </div>
                </div>

                <div id="content-display" style="padding: 40px; flex-grow: 1;">
                    <div class="text-center mt-5">
                        <div class="spinner-border text-warning"></div>
                        <p class="text-white mt-2">데이터를 불러오고 있습니다...</p>
                    </div>
                </div>
            </div>

    <script>
        // 뒤로가기 기능을 위해 현재 팀 ID 저장
        let currentTeamId = null;

        // 페이지 로드 시 팀 목록 및 초기 순위표 가져오기
        document.addEventListener('DOMContentLoaded', function() {
            // 1. 사이드바 팀 목록 로드
            fetch('/api/teams')
                .then(response => response.json())
                .then(data => {
                    const createItem = (team) => `
                        <div onclick="showTeamDetail(${team.id}, '${team.name.replace(/'/g, "\\'")}')" 
                            style="padding: 10px; cursor: pointer; border-radius: 4px; display: flex; align-items: center; transition: 0.3s;"
                            onmouseover="this.style.backgroundColor='#343a40'" 
                            onmouseout="this.style.backgroundColor='transparent'">
                            <img src="https://www.mlbstatic.com/team-logos/${team.id}.svg" width="20" height="20" style="margin-right: 10px;">
                            <span class="text-white" style="font-size: 0.9rem;">${team.name}</span>
                        </div>
                    `;
                    document.getElementById('al-list').innerHTML = data.american.map(createItem).join('');
                    document.getElementById('nl-list').innerHTML = data.national.map(createItem).join('');
                });

            // 2. 초기 화면으로 리그 전체 순위표 출력
            showStandings(); 
        });

        // 팀 클릭 시 로스터 출력
        async function showTeamDetail(teamId) {
            currentTeamId = teamId;
            const display = document.getElementById('content-display');
            
            // 로딩 표시 (스피너)
            display.innerHTML = `
                <div class="text-center mt-5">
                    <div class="spinner-border text-warning"></div>
                    <p class="text-white mt-2">로스터를 불러오고 있습니다...</p>
                </div>`;

            try {
                const response = await fetch(`/api/roster/${teamId}`);
                const data = await response.json();

                // 선수 카드 생성 (그리드 시스템)
                const cards = data.roster.map(item => {
                    const p = item.person;
                    const imgUrl = `https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_213,q_auto:best/v1/people/${p.id}/headshot/67/current`;
                    
                    return `
                        <div class="player-col"> <div class="card bg-dark border-secondary h-100 player-card" 
                                onclick="showPlayerStats(${p.id})" 
                                style="cursor: pointer; transition: transform 0.2s; border-radius: 8px; overflow: hidden;">
                                
                                <img src="${imgUrl}" class="card-img-top" alt="${p.fullName}" 
                                    style="background: #212529; aspect-ratio: 1/1; object-fit: cover;">
                                
                                <div class="card-body text-center p-2">
                                    <h6 class="fw-bold text-warning mb-1" style="font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                                        ${p.fullName}
                                    </h6>
                                    <p class="text-white mb-0" style="font-size: 0.75rem; opacity: 0.8;">
                                        ${item.position.abbreviation} | No.${item.jerseyNumber || '-'}
                                    </p>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                // 로스터 제목 / 디아즈년 부상으로 빠진거 확인됨
                display.innerHTML = `
                    <div class="container-fluid">
                        <div class="d-flex align-items-center mb-4">
                            <button onclick="showStandings()" class="btn btn-outline-warning btn-sm me-3">
                                ← 뒤로가기
                            </button>
                            <h3 class="text-white fw-bold m-0">팀 로스터</h3>
                        </div>
                        <div class="d-flex flex-wrap" style="margin: 0 -10px;"> 
                            ${cards}
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error("로스터 로드 실패:", error);
                display.innerHTML = `<div class="alert alert-danger">로스터 정보를 불러오지 못했습니다.</div>`;
            }
        }

        async function showPlayerStats(playerId) {
            const display = document.getElementById('content-display');
            
            // 1. 로딩 표시
            display.innerHTML = `
                <div class="text-center" style="margin-top: 100px;">
                    <div class="spinner-border text-primary"></div>
                    <p class="mt-2">데이터를 불러오는 중...</p>
                </div>`;

            try {
                // 2. 백엔드 API 호출
                const response = await fetch(`/api/player/${playerId}`);
                const data = await response.json();
                
                const player = data.info;
                const stats = data.stats;

                // 3. 화면 렌더링
                display.innerHTML = `
                    <div class="container py-2">
                        <div class="d-flex align-items-center mb-4">
                            <h2 class="fw-bold m-0 text-white" onclick="goBack()" style="cursor: pointer;">
                                <span class="text-warning">←</span> Player Profile
                            </h2>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-4">
                                <div class="card shadow-sm border-0 bg-dark text-white text-center p-3">
                                    <img src="${data.imageUrl}" class="mx-auto mt-3" style="width: 180px; border-radius: 5%; background:#212529;">
                                    <h3 class="mt-3 fw-bold text-warning">${player.fullName}</h3>
                                    <p class="text-white opacity-75">${player.primaryPosition.name} | No.${player.primaryNumber}</p>
                                    <hr class="border-secondary">
                                    <div class="text-start ps-3">
                                        <p><strong>Birth:</strong> ${player.birthDate}</p>
                                        <p><strong>From:</strong> ${player.birthCity}</p>
                                        <p><strong>H/W:</strong> ${player.height} / ${player.weight}lb</p>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-8">
                                <div class="card shadow-sm border-0 bg-dark">
                                    <div class="card-header bg-warning text-dark fw-bold">2026 Season Stats</div>
                                    <div class="card-body p-0">
                                        <table class="table table-dark table-hover mb-0">
                                            <tbody>
                                                ${stats.map(item => `
                                                    <tr>
                                                        <td class="text-white opacity-75 ps-4">${item.Info}</td>
                                                        <td class="fw-bold text-warning text-end pe-4">${item.Record}</td>
                                                    </tr>
                                                `).join('')}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error("오류:", error);
            }
        }

        async function showStandings() {
            const display = document.getElementById('content-display');
            const res = await fetch('/api/standings/divisions');
            const data = await res.json();
            const divNames = {
                200: "AL East", 202: "AL Central", 201: "AL West",
                203: "NL East", 205: "NL Central", 204: "NL West"
            };

                // 200: "아메리칸 동부", 202: "아메리칸 중부", 201: "아메리칸 서부",
                // 203: "내셔널 동부", 205: "내셔널 동부", 204: "NL West"

            const cards = data.map(div => `
                <div class="col-xl-4 col-md-6 mb-4">
                    <div class="card bg-dark border-secondary">
                        <div class="card-header border-secondary text-center text-warning fw-bold">
                            ${divNames[div.division.id] || div.division.name}
                        </div>
                        <table class="table table-dark table-hover m-0" style="font-size: 0.8rem;">
                            <thead>
                                <tr class="text-center text-muted" style="font-size: 0.7rem;">
                                    <th>순위</th><th class="text-start">팀</th><th>승</th><th>패</th><th>승률</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${div.teamRecords.map(t => `
                                    <tr class="align-middle text-center">
                                        <td class="fw-bold text-white-50">${t.divisionRank}</td>
                                        <td class="text-start" onclick="showTeamDetail(${t.team.id}, '${t.team.name.replace(/'/g, "\\'")}')" style="cursor:pointer">
                                            <img src="https://www.mlbstatic.com/team-logos/${t.team.id}.svg" width="18" class="me-1">
                                            ${t.team.teamName}
                                        </td>
                                        <td>${t.wins}</td><td>${t.losses}</td>
                                        <td class="text-warning">${t.winningPercentage}</td>
                                    </tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`).join('');

            display.innerHTML = `<div class="container-fluid py-3"><div class="row">${cards}</div></div>`;
        }

        // 뒤로가기
        function goBack() {
            if (currentTeamId) {
                showTeamDetail(currentTeamId); // 이전 팀 로스터 화면으로 이동
            }
        }

        // 검색
        async function searchAndGo() {
            const name = document.getElementById('player-search').value;
            try {
                // 1. 백엔드에 검색 요청
                const response = await fetch(`/api/search?name=${encodeURIComponent(name)}`);
                const results = await response.json();

                if (results && results.length > 0) {
                    // 2. 선수 id 높은 놈 우선 검색
                    const firstPlayerId = results[0].id;
                    
                    // 3. 기존에 만들어둔 상세 정보 함수 호출
                    showPlayerStats(firstPlayerId);
                    
                    // 4. 검색창 비우기
                    document.getElementById('player-search').value = "";
                }
            } catch (error) {
                console.error("검색 중 오류 발생:", error);
            }
        }
    </script>
</body>
</html>
