<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB STATS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-base:    #0d1117;
            --bg-surface: #161b22;
            --bg-card:    #21262d;
            --bg-hover:   #2d333b;
            --border:     #30363d;
            --border-lt:  #444c56;
            --accent:     #f5a623;
            --accent-dim: rgba(245,166,35,0.12);
            --text-1:     #e6edf3;
            --text-2:     #8b949e;
            --text-3:     #6e7681;
            --blue:       #388bfd;
            --red:        #f85149;
            --green:      #3fb950;
        }
        :root[data-theme="light"] {
            --bg-base:    #f6f8fa;
            --bg-surface: #ffffff;
            --bg-card:    #f0f2f5;
            --bg-hover:   #e8ebef;
            --border:     #d0d7de;
            --border-lt:  #afb8c1;
            --accent:     #c8861a;
            --accent-dim: rgba(200,134,26,0.1);
            --text-1:     #1f2328;
            --text-2:     #57606a;
            --text-3:     #8c959f;
            --blue:       #0969da;
            --red:        #cf222e;
            --green:      #1a7f37;
        }

        html { font-size: 150%; }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-base);
            color: var(--text-1);
            margin: 0;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-lt); border-radius: 3px; }

        /* ── Layout ────────────────────────────────── */
        #layout { display: flex; min-height: 100vh; }

        /* ── Sidebar ───────────────────────────────── */
        #sidebar {
            width: 256px;
            height: 100vh;
            background: var(--bg-surface);
            position: fixed;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            z-index: 999;
            transition: transform 0.25s ease;
            overflow: hidden;
        }

        .sb-head {
            padding: 16px 14px 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .sb-logo {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--accent);
            cursor: pointer;
        }
        .sb-search-wrap {
            margin-top: 10px;
            position: relative;
        }
        .sb-search-wrap input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 10px 6px 30px;
            color: var(--text-1);
            font-size: 0.8rem;
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }
        .sb-search-wrap input:focus { border-color: var(--accent); }
        .sb-search-wrap input::placeholder { color: var(--text-3); }
        .sb-search-ico {
            position: absolute;
            left: 9px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.75rem;
            color: var(--text-3);
            pointer-events: none;
        }

        /* ── Sidebar Nav ────────────────────────────── */
        .sb-nav {
            display: flex;
            gap: 5px;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .sb-nav-btn {
            flex: 1;
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-2);
            font-size: 0.7rem;
            font-weight: 600;
            padding: 5px 3px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.15s;
            white-space: nowrap;
            text-align: center;
        }
        .sb-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
        .sb-nav-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

        .sb-body { overflow-y: auto; flex-grow: 1; padding: 6px 0 0; }

        .sb-league {
            padding: 12px 14px 4px;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-3);
        }

        .sb-team {
            padding: 7px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 2px solid transparent;
            transition: background 0.15s;
        }
        .sb-team:hover { background: var(--bg-hover); }
        .sb-team.active {
            background: var(--accent-dim);
            border-left-color: var(--accent);
        }
        .sb-team span {
            font-size: 0.83rem;
            color: var(--text-1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Sidebar 원래 크기 고정 (html 150% 스케일 상쇄) ── */
        .sb-logo                  { font-size: 22px; }
        .sb-search-wrap input     { font-size: 13px; }
        .sb-search-ico            { font-size: 12px; }
        .sb-league                { font-size: 10px; }
        .sb-nav-btn               { font-size: 11px; }
        .sb-team span             { font-size: 13px; }

        /* ── Favorites ─────────────────────────────── */
        .fav-section {
            border-top: 1px solid var(--border);
            padding: 10px 14px 14px;
            flex-shrink: 0;
        }
        .fav-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 6px;
        }
        .fav-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 0;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-1);
            transition: color 0.12s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .fav-item:hover { color: var(--accent); }
        .fav-empty { font-size: 12px; color: var(--text-3); padding: 4px 0; }

        /* ── Main ──────────────────────────────────── */
        #main-content {
            margin-left: 256px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-width: 0;
            overflow-x: hidden;
        }

        /* ── Header ────────────────────────────────── */
        #top-header {
            height: 56px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            position: sticky;
            top: 0;
            background: rgba(13,17,23,0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }
        :root[data-theme="light"] #top-header {
            background: rgba(246,248,250,0.92);
        }

        .hd-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.67rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--accent);
            cursor: pointer;
        }

        #hamburger {
            display: none;
            background: none;
            border: none;
            color: var(--text-2);
            font-size: 1.2rem;
            cursor: pointer;
            margin-right: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            transition: background 0.15s;
        }
        #hamburger:hover { background: var(--bg-hover); }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-2);
            padding: 5px 9px;
            cursor: pointer;
            font-size: 0.9rem;
            line-height: 1;
            transition: border-color 0.15s, color 0.15s;
            margin-left: 8px;
        }
        .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

        /* ── Score Banner ──────────────────────────── */
        #score-banner-container {
            display: flex;
            align-items: stretch;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            min-height: 52px;
        }
        #score-banner {
            flex-grow: 1;
            padding: 0 12px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            align-items: center;
            scroll-behavior: smooth;
        }
        #score-banner::-webkit-scrollbar { height: 3px; }
        #score-banner::-webkit-scrollbar-track { background: transparent; }
        #score-banner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .banner-nav-btn {
            background: none;
            border: none;
            border-right: 1px solid var(--border);
            color: var(--text-2);
            font-size: 1.1rem;
            padding: 0 14px;
            cursor: pointer;
            flex-shrink: 0;
            transition: color 0.15s, background 0.15s;
            line-height: 1;
        }
        .banner-nav-btn:last-child { border-right: none; border-left: 1px solid var(--border); }
        .banner-nav-btn:hover:not(:disabled) { color: var(--accent); background: var(--bg-hover); }
        .banner-nav-btn:disabled { color: var(--border-lt); cursor: default; }

        .score-game {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 12px;
            white-space: nowrap;
            flex-shrink: 0;
            font-size: 0.78rem;
        }
        .score-team { display: flex; align-items: center; gap: 5px; }
        .score-num {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            min-width: 16px;
            text-align: center;
            color: var(--text-2);
        }
        .score-num.win { color: var(--accent); }
        .score-sep { color: var(--border-lt); }
        .score-status {
            font-size: 0.63rem;
            color: var(--text-3);
            padding: 1px 5px;
            border-radius: 3px;
            background: var(--bg-hover);
            white-space: nowrap;
        }
        .score-status.live { color: var(--green); background: rgba(63,185,80,0.12); }

        /* ── Search ────────────────────────────────── */
        #search-wrapper { position: relative; width: 310px; }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0 10px;
            gap: 8px;
            transition: border-color 0.2s;
        }
        .search-box:focus-within { border-color: var(--accent); }

        .search-ico { color: var(--text-3); font-size: 0.8rem; }

        #player-search {
            background: none;
            border: none;
            outline: none;
            color: var(--text-1);
            font-size: 0.85rem;
            padding: 8px 0;
            flex-grow: 1;
            font-family: 'Inter', sans-serif;
        }
        #player-search::placeholder { color: var(--text-3); }

        .search-btn {
            background: var(--accent);
            border: none;
            border-radius: 5px;
            color: #000;
            font-weight: 700;
            font-size: 0.75rem;
            padding: 4px 11px;
            cursor: pointer;
            flex-shrink: 0;
            transition: opacity 0.15s;
            font-family: 'Inter', sans-serif;
        }
        .search-btn:hover { opacity: 0.82; }

        #search-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 5px);
            left: 0; right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border-lt);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 8px 28px rgba(0,0,0,0.45);
            z-index: 9999;
            max-height: 272px;
            overflow-y: auto;
        }
        .s-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 9px 14px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-1);
            border-bottom: 1px solid var(--border);
            transition: background 0.12s;
        }
        .s-item:hover { background: var(--bg-hover); }
        .s-item:last-child { border-bottom: none; }
        .s-pos {
            font-size: 0.7rem;
            background: var(--bg-hover);
            color: var(--text-2);
            border-radius: 4px;
            padding: 1px 6px;
        }

        /* ── Content wrapper ───────────────────────── */
        #content-display { padding: 24px 28px; flex-grow: 1; }

        /* ── Skeleton ──────────────────────────────── */
        .skel {
            background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-hover) 50%, var(--bg-card) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.3s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ── Page title ────────────────────────────── */
        .page-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 18px;
            color: var(--text-1);
        }

        /* ── Standings ─────────────────────────────── */
        .standings-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
        }
        @media (max-width: 1024px) {
            .standings-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .div-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        .div-head {
            padding: 11px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border);
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.8px;
        }
        .league-badge {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .al-badge { background: rgba(56,139,253,0.18); color: var(--blue); }
        .nl-badge { background: rgba(248,81,73,0.18); color: var(--red); }

        .s-table { width: 100%; border-collapse: collapse; }
        .s-table th {
            padding: 6px 10px;
            font-size: 0.63rem;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--text-3);
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .s-table th:nth-child(2) { text-align: left; }
        .s-table td {
            padding: 8px 10px;
            font-size: 0.8rem;
            text-align: center;
            color: var(--text-1);
            border-bottom: 1px solid var(--border);
        }
        .s-table td:nth-child(2) { text-align: left; }
        .s-table tr:last-child td { border-bottom: none; }
        .s-table tr:hover td { background: var(--bg-hover); }

        .team-cell {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            white-space: nowrap;
        }
        .team-cell:hover span { color: var(--accent); }
        .rank-cell { color: var(--text-3); font-weight: 600; font-size: 0.75rem; }
        .wpct-val { color: var(--accent); font-weight: 600; }
        .wpct-bar-bg {
            display: inline-block;
            width: 44px;
            height: 3px;
            background: var(--bg-hover);
            border-radius: 2px;
            vertical-align: middle;
            margin-left: 5px;
        }
        .wpct-bar-fill { height: 100%; border-radius: 2px; background: var(--accent); }
        .gb-cell { color: var(--text-3); }

        /* ── Roster ────────────────────────────────── */
        .roster-top {
            display: flex;
            align-items: center;
            gap: 14px;
            padding-bottom: 16px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-2);
            padding: 5px 12px;
            font-size: 0.8rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            flex-shrink: 0;
            transition: border-color 0.15s, color 0.15s;
        }
        .back-btn:hover { border-color: var(--accent); color: var(--accent); }

        .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
        .fpill {
            padding: 5px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: none;
            color: var(--text-2);
            font-size: 0.78rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.15s;
        }
        .fpill:hover { border-color: var(--accent); color: var(--accent); }
        .fpill.active {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
        }

        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
            gap: 12px;
        }

        .player-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
        }
        .player-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
        }
        .player-card-img {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            object-position: top center;
            background: var(--bg-card);
            display: block;
        }
        .player-pos-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            border-radius: 4px;
            padding: 2px 7px;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text-2);
        }
        /* 포지션별 배지 색상 */
        .badge-pitcher    { color: #60a5fa; }
        .badge-catcher    { color: var(--green); }
        .badge-infielder  { color: var(--accent); }
        .badge-outfielder { color: #fb7185; }
        .badge-twoway     { color: #a78bfa; }
        .badge-dh         { color: var(--text-2); }

        /* 부상자 배지 */
        .il-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(248,81,73,0.82);
            backdrop-filter: blur(4px);
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 0.6rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
        }
        .il-note {
            font-size: 0.65rem;
            color: var(--red);
            margin: 2px 0 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 즐겨찾기 별 버튼 */
        .star-btn {
            position: absolute;
            bottom: 40px;
            right: 8px;
            background: rgba(0,0,0,0.5);
            border: none;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text-3);
            transition: color 0.15s, background 0.15s;
            z-index: 5;
            line-height: 1;
        }
        .star-btn:hover { color: #f5c518; background: rgba(0,0,0,0.7); }
        .star-btn.starred { color: #f5c518; }

        .player-card-body { padding: 10px 10px 12px; }
        .player-card-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
        }
        .player-card-sub { font-size: 0.7rem; color: var(--text-3); margin: 0; }

        /* ── Player Profile ────────────────────────── */
        .profile-hero {
            background: linear-gradient(135deg, var(--bg-surface), var(--bg-card));
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            gap: 24px;
            align-items: flex-start;
            margin-bottom: 18px;
        }
        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 10px;
            object-fit: cover;
            object-position: top center;
            background: var(--bg-card);
            border: 2px solid var(--border-lt);
            flex-shrink: 0;
        }
        .profile-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2.67rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 4px;
        }
        .profile-pos {
            font-size: 0.82rem;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 14px;
        }
        .profile-meta { display: flex; flex-wrap: wrap; gap: 20px; }
        .pmeta-label { display: block; font-size: 0.68rem; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
        .pmeta-val { font-size: 0.85rem; font-weight: 500; color: var(--text-1); }

        /* 선수 프로필 즐겨찾기 버튼 */
        .profile-fav-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-3);
            font-size: 0.82rem;
            padding: 5px 12px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.15s;
            margin-left: auto;
        }
        .profile-fav-btn:hover { border-color: var(--accent); color: var(--accent); }
        .profile-fav-btn.starred { color: #f5c518; border-color: #f5c518; background: rgba(245,197,24,0.12); }

        /* Stat tabs */
        .stat-tabs {
            display: flex;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: 10px 10px 0 0;
        }
        .stat-tab-btn {
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-2);
            padding: 12px 20px;
            cursor: pointer;
            font-size: 0.83rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            transition: color 0.15s;
            margin-bottom: -1px;
        }
        .stat-tab-btn:hover { color: var(--text-1); }
        .stat-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        .stat-tab-pane { display: none; }
        .stat-tab-pane.active { display: block; }

        .stats-wrap {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 10px 10px;
            overflow: hidden;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 11px 20px;
            border-bottom: 1px solid var(--border);
            transition: background 0.12s;
        }
        .stat-row:last-child { border-bottom: none; }
        .stat-row:hover { background: var(--bg-hover); }
        .stat-label { font-size: 0.83rem; color: var(--text-2); }
        .stat-val {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.5px;
        }

        /* Chart */
        .chart-container { padding: 16px; position: relative; height: 260px; }
        .gamelog-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            white-space: nowrap;
        }
        .gamelog-table th {
            background: var(--bg-card);
            color: var(--text-3);
            font-weight: 600;
            padding: 6px 10px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            letter-spacing: 0.03em;
        }
        .gamelog-table td {
            padding: 6px 10px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            color: var(--text-1);
        }
        .gamelog-table tbody tr:hover { background: var(--bg-hover); }
        .gamelog-table td:first-child,
        .gamelog-table td:nth-child(2) { color: var(--text-2); }

        /* ── Two-Way Player 2열 레이아웃 ──────────── */
        .twoway-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--border);
        }
        .twoway-col { background: var(--bg-surface); }
        .twoway-col-head {
            padding: 8px 16px;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }
        .bat-head { color: var(--accent); }
        .pit-head { color: var(--blue); }
        @media (max-width: 540px) { .twoway-grid { grid-template-columns: 1fr; } }

        /* ── Leaderboard ───────────────────────────── */
        .leader-table { width: 100%; border-collapse: collapse; }
        .leader-table th {
            padding: 8px 12px;
            font-size: 0.63rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--text-3);
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .leader-table th:last-child { text-align: right; }
        .leader-table td {
            padding: 10px 12px;
            font-size: 0.82rem;
            border-bottom: 1px solid var(--border);
            color: var(--text-1);
        }
        .leader-table tr:last-child td { border-bottom: none; }
        .leader-table tbody tr:hover td { background: var(--bg-hover); cursor: pointer; }
        .leader-rank {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-3);
            width: 36px;
        }
        .leader-rank.gold   { color: #ffd700; }
        .leader-rank.silver { color: #c0c0c0; }
        .leader-rank.bronze { color: #cd7f32; }
        .leader-val {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
            text-align: right;
        }

        /* ── Team Compare ──────────────────────────── */
        .compare-select-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .compare-select {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-1);
            padding: 8px 14px;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            flex: 1;
            min-width: 160px;
        }
        .compare-select:focus { border-color: var(--accent); }
        .compare-select option { background: var(--bg-card); }
        .compare-btn {
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 8px 20px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.15s;
        }
        .compare-btn:hover { opacity: 0.85; }

        .compare-grid {
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        .compare-team-header {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: var(--bg-surface);
            border-bottom: 2px solid var(--border);
        }
        .compare-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .compare-header:first-child { border-right: 1px solid var(--border); }
        .compare-header-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
        }
        .compare-section-label {
            background: var(--bg-card);
            padding: 7px 16px;
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-3);
            border-bottom: 1px solid var(--border);
        }
        .compare-row {
            display: grid;
            grid-template-columns: 72px 1fr 72px;
            align-items: center;
            padding: 9px 16px;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-surface);
        }
        .compare-row:last-child { border-bottom: none; }
        .cmp-val {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-1);
            white-space: nowrap;
        }
        .cmp-val.left  { text-align: right; }
        .cmp-val.right { text-align: left; }
        .cmp-val.better { color: var(--green); }
        .cmp-val.worse  { color: var(--text-3); }
        .cmp-bar-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        .cmp-bar-label {
            font-size: 0.68rem;
            color: var(--text-3);
            letter-spacing: 0.04em;
        }
        .cmp-bar-track {
            width: 100%;
            height: 6px;
            background: var(--bg-card);
            border-radius: 3px;
            display: flex;
            overflow: hidden;
        }
        .cmp-bar-left {
            height: 100%;
            background: var(--accent);
            border-radius: 3px 0 0 3px;
            transition: width 0.4s ease;
        }
        .cmp-bar-right {
            height: 100%;
            background: #60a5fa;
            border-radius: 0 3px 3px 0;
            transition: width 0.4s ease;
        }

        /* ── Overlay ───────────────────────────────── */
        #sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 998;
        }

        /* ── Mobile ────────────────────────────────── */
        @media (max-width: 768px) {
            #sidebar              { transform: translateX(-256px); }
            #sidebar.open         { transform: translateX(0); }
            #sidebar-overlay.open { display: block; }
            #main-content         { margin-left: 0; }
            #hamburger            { display: block; }
            #search-wrapper       { width: 160px; }
            #content-display      { padding: 16px; }
            #score-banner         { padding: 0 16px; }
            .profile-hero         { flex-direction: column; }
            .standings-grid       { grid-template-columns: 1fr; }
            .compare-grid         { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="sidebar-overlay" onclick="closeSidebar()"></div>

    <div id="layout">

        <!-- ── Sidebar ── -->
        <div id="sidebar">
            <div class="sb-head">
                <div class="sb-logo" onclick="showStandings()">⚾ MLB STATS</div>
                <div class="sb-search-wrap">
                    <span class="sb-search-ico">🔍</span>
                    <input type="text" placeholder="팀 검색..." oninput="filterTeams(this.value)">
                </div>
            </div>

            <!-- 사이드바 네비게이션 -->
            <div class="sb-nav">
                <button class="sb-nav-btn active" data-nav="standings" onclick="showStandings()">순위표</button>
                <button class="sb-nav-btn" data-nav="leaderboard" onclick="showLeaderboard()">리더보드</button>
                <button class="sb-nav-btn" data-nav="compare" onclick="showCompare()">팀 비교</button>
            </div>
            <div style="padding: 6px 14px; border-bottom: 1px solid var(--border);">
                <button class="sb-nav-btn" data-nav="favorites" onclick="showFavorites()" style="width:100%;">★ 즐겨찾기</button>
            </div>

            <div class="sb-body">
                <div class="sb-league">American League</div>
                <div id="al-list"></div>
                <div class="sb-league" style="margin-top:8px;">National League</div>
                <div id="nl-list"></div>
            </div>

        </div>

        <!-- ── Main ── -->
        <div id="main-content">

            <div id="top-header">
                <div style="display:flex; align-items:center;">
                    <button id="hamburger" onclick="toggleSidebar()">☰</button>
                    <span class="hd-title" onclick="showStandings()">MLB STATS</span>
                </div>
                <div style="display:flex; align-items:center; gap:6px;">
                    <div id="search-wrapper">
                        <div class="search-box">
                            <span class="search-ico">🔍</span>
                            <input type="text" id="player-search"
                                placeholder="선수 검색..."
                                autocomplete="off"
                                oninput="onSearchInput(this.value)"
                                onkeyup="if(event.keyCode===13){closeDropdown();searchAndGo();}">
                            <button class="search-btn" onclick="closeDropdown();searchAndGo()">Search</button>
                        </div>
                        <div id="search-dropdown"></div>
                    </div>
                    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="테마 전환">☀️</button>
                </div>
            </div>

            <!-- 경기 전적 배너 -->
            <div id="score-banner-container">
                <button class="banner-nav-btn" id="banner-prev" onclick="shiftBanner(-1)">‹</button>
                <div id="score-banner">
                    <span style="color:var(--text-3); font-size:0.75rem;">경기 정보 로딩 중...</span>
                </div>
                <button class="banner-nav-btn" id="banner-next" onclick="shiftBanner(1)" disabled>›</button>
            </div>

            <div id="content-display">
                <div class="standings-grid">
                    <div class="skel" style="height:220px;"></div>
                    <div class="skel" style="height:220px;"></div>
                    <div class="skel" style="height:220px;"></div>
                    <div class="skel" style="height:220px;"></div>
                    <div class="skel" style="height:220px;"></div>
                    <div class="skel" style="height:220px;"></div>
                </div>
            </div>


        </div>
    </div>

<script>
    let currentTeamId    = null;
    let searchTimer      = null;
    let recentChartInst  = null;
    const tabLoaded      = {};
    let allTeams         = {};
    let leaderCache      = {};

    document.addEventListener('DOMContentLoaded', () => {
        initTheme();
        loadScoreBanner();

        fetch('/api/teams')
            .then(r => r.json())
            .then(data => {
                [...data.american, ...data.national].forEach(t => allTeams[t.id] = t);

                const mkItem = t => `
                    <div class="sb-team" id="sb-${t.id}" onclick="showTeamDetail(${t.id})">
                        <img src="https://www.mlbstatic.com/team-logos/${t.id}.svg" width="22" height="22">
                        <span>${t.name}</span>
                    </div>`;
                document.getElementById('al-list').innerHTML = data.american.map(mkItem).join('');
                document.getElementById('nl-list').innerHTML = data.national.map(mkItem).join('');
            });
        showStandings();

        document.addEventListener('click', e => {
            if (!document.getElementById('search-wrapper').contains(e.target)) closeDropdown();
        });
    });

    // ── Theme ─────────────────────────────────────────
    function initTheme() {
        const saved = localStorage.getItem('mlb_theme') || 'dark';
        document.documentElement.dataset.theme = saved === 'light' ? 'light' : '';
        document.getElementById('theme-toggle').textContent = saved === 'light' ? '🌙' : '☀️';
    }

    function toggleTheme() {
        const isLight = document.documentElement.dataset.theme === 'light';
        const next = isLight ? 'dark' : 'light';
        document.documentElement.dataset.theme = next === 'light' ? 'light' : '';
        document.getElementById('theme-toggle').textContent = next === 'light' ? '🌙' : '☀️';
        localStorage.setItem('mlb_theme', next);
    }

    // ── Score Banner ───────────────────────────────────
    let bannerDateStr = '';

    async function loadScoreBanner() {
        // 최근 완료 경기 자동 탐색
        for (let i = 0; i <= 3; i++) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            const dateStr = d.toLocaleDateString('en-CA');
            const r   = await fetch(`/api/schedule?date=${dateStr}`);
            const all = await r.json();
            if (all.filter(g => g.status === 'Final').length) {
                await loadBannerForDate(dateStr);
                return;
            }
        }
        document.getElementById('score-banner').innerHTML =
            `<span style="color:var(--text-3); font-size:0.75rem;">최근 경기 없음</span>`;
    }

    async function loadBannerForDate(dateStr) {
        const banner = document.getElementById('score-banner');
        banner.innerHTML = `<span style="color:var(--text-3); font-size:0.75rem;">로딩 중...</span>`;
        try {
            const r   = await fetch(`/api/schedule?date=${dateStr}`);
            const all = await r.json();
            bannerDateStr = dateStr;
            updateBannerNav();
            if (!all.length) {
                banner.innerHTML = `<span style="color:var(--text-3); font-size:0.75rem;">해당 날짜 경기 없음</span>`;
                return;
            }
            renderBannerGames(all, dateStr);
        } catch(e) { banner.innerHTML = ''; }
    }

    function shiftBanner(dir) {
        const banner = document.getElementById('score-banner');
        // 배너 안에 경기가 있고 스크롤 여지가 있으면 먼저 스크롤
        const scrollAmt = banner.clientWidth * 0.7;
        const atLeft  = banner.scrollLeft <= 0;
        const atRight = banner.scrollLeft + banner.clientWidth >= banner.scrollWidth - 2;
        if (dir === -1 && !atLeft) { banner.scrollLeft -= scrollAmt; return; }
        if (dir ===  1 && !atRight) { banner.scrollLeft += scrollAmt; return; }

        // 스크롤 끝에 도달하면 날짜 이동
        if (!bannerDateStr) return;
        const [y, m, d] = bannerDateStr.split('-').map(Number);
        const date = new Date(y, m - 1, d);
        date.setDate(date.getDate() + dir);
        const newDate = date.toLocaleDateString('en-CA');
        const today   = new Date().toLocaleDateString('en-CA');
        if (newDate > today) return;
        loadBannerForDate(newDate);
    }

    function updateBannerNav() {
        const today   = new Date().toLocaleDateString('en-CA');
        const nextBtn = document.getElementById('banner-next');
        if (nextBtn) nextBtn.disabled = (bannerDateStr >= today);
    }

    function renderBannerGames(games, dateStr) {
        const banner = document.getElementById('score-banner');
        const label  = `<span style="color:var(--text-3); font-size:0.7rem; white-space:nowrap; flex-shrink:0; margin-right:4px;">${dateStr}</span>`;
        banner.innerHTML = label + games.map(g => {
            const isFinal  = g.status === 'Final';
            const isLive   = g.status === 'Live';
            const hasScore = isFinal || isLive;
            const awayWin  = isFinal && g.away.score > g.home.score;
            const homeWin  = isFinal && g.home.score > g.away.score;
            let statusLabel = '예정';
            if (isFinal) statusLabel = '종료';
            else if (isLive) statusLabel = `${g.inning}회 ${g.inningHalf === 'Top' ? '▲' : '▼'}`;
            return `<div class="score-game">
                <div class="score-team">
                    <img src="https://www.mlbstatic.com/team-logos/${g.away.id}.svg" width="18" height="18">
                    <span style="color:var(--text-2); font-size:0.75rem;">${g.away.name}</span>
                    ${hasScore ? `<span class="score-num ${awayWin ? 'win' : ''}">${g.away.score}</span>` : ''}
                </div>
                <span class="score-sep">–</span>
                <div class="score-team">
                    ${hasScore ? `<span class="score-num ${homeWin ? 'win' : ''}">${g.home.score}</span>` : ''}
                    <span style="color:var(--text-2); font-size:0.75rem;">${g.home.name}</span>
                    <img src="https://www.mlbstatic.com/team-logos/${g.home.id}.svg" width="18" height="18">
                </div>
                <span class="score-status ${isLive ? 'live' : ''}">${statusLabel}</span>
            </div>`;
        }).join('');
    }

    // ── Sidebar helpers ────────────────────────────────
    function filterTeams(q) {
        q = q.toLowerCase();
        document.querySelectorAll('.sb-team').forEach(el => {
            el.style.display = el.querySelector('span').textContent.toLowerCase().includes(q) ? '' : 'none';
        });
    }

    function setActiveTeam(id) {
        document.querySelectorAll('.sb-team').forEach(el => el.classList.remove('active'));
        if (id) document.getElementById(`sb-${id}`)?.classList.add('active');
    }

    function setActiveNav(which) {
        document.querySelectorAll('.sb-nav-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.nav === which);
        });
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebar-overlay').classList.toggle('open');
    }
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebar-overlay').classList.remove('open');
    }

    // ── Search dropdown ───────────────────────────────
    function onSearchInput(val) {
        clearTimeout(searchTimer);
        if (val.length < 2) { closeDropdown(); return; }
        searchTimer = setTimeout(async () => {
            try {
                const r = await fetch(`/api/search?name=${encodeURIComponent(val)}`);
                const list = await r.json();
                if (!list.length) { closeDropdown(); return; }
                const dd = document.getElementById('search-dropdown');
                dd.innerHTML = list.slice(0, 8).map(p => `
                    <div class="s-item" onclick="selectPlayer(${p.id})">
                        <span>
                            ${p.koreanName || p.fullName || ''}
                            <span style="color:var(--text-3); font-size:0.75rem; margin-left:5px;">${p.koreanName ? p.fullName : ''}</span>
                        </span>
                        <span class="s-pos">${p.primaryPosition?.abbreviation || ''}</span>
                    </div>`).join('');
                dd.style.display = 'block';
            } catch(e) {}
        }, 280);
    }

    function selectPlayer(id) {
        document.getElementById('player-search').value = '';
        closeDropdown();
        showPlayerStats(id);
    }
    function closeDropdown() {
        document.getElementById('search-dropdown').style.display = 'none';
    }
    async function searchAndGo() {
        const name = document.getElementById('player-search').value.trim();
        if (!name) return;
        try {
            const r = await fetch(`/api/search?name=${encodeURIComponent(name)}`);
            const list = await r.json();
            if (list?.length) {
                showPlayerStats(list[0].id);
                document.getElementById('player-search').value = '';
            }
        } catch(e) {}
    }

    // ── Standings ─────────────────────────────────────
    async function showStandings() {
        setActiveTeam(null);
        setActiveNav('standings');
        closeSidebar();
        const display = document.getElementById('content-display');
        display.innerHTML = `<div class="standings-grid">${[...Array(6)].map(() =>
            `<div class="skel" style="height:240px;"></div>`).join('')}</div>`;

        const res  = await fetch('/api/standings/divisions');
        const data = await res.json();
        const divNames = {
            200:"AL East", 202:"AL Central", 201:"AL West",
            203:"NL East", 205:"NL Central", 204:"NL West"
        };
        const alIds = [200, 201, 202];

        const cards = data.map(div => {
            const isAL  = alIds.includes(div.division.id);
            const badge = `<span class="league-badge ${isAL ? 'al-badge' : 'nl-badge'}">${isAL ? 'AL' : 'NL'}</span>`;
            const rows  = div.teamRecords.map(t => {
                const pct = parseFloat(t.winningPercentage || 0);
                return `
                    <tr>
                        <td class="rank-cell">${t.divisionRank}</td>
                        <td>
                            <div class="team-cell" onclick="showTeamDetail(${t.team.id})">
                                <img src="https://www.mlbstatic.com/team-logos/${t.team.id}.svg" width="20" height="20">
                                <span>${t.team.teamName}</span>
                            </div>
                        </td>
                        <td>${t.wins}</td>
                        <td>${t.losses}</td>
                        <td>
                            <span class="wpct-val">${t.winningPercentage}</span>
                            <span class="wpct-bar-bg"><span class="wpct-bar-fill" style="width:${Math.round(pct*100)}%;"></span></span>
                        </td>
                        <td class="gb-cell">${t.gamesBack}</td>
                    </tr>`;
            }).join('');

            return `
                <div class="div-card">
                    <div class="div-head">${badge}${divNames[div.division.id] || div.division.name}</div>
                    <table class="s-table">
                        <thead><tr><th>#</th><th>팀</th><th>W</th><th>L</th><th>PCT</th><th>GB</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>`;
        }).join('');

        display.innerHTML = `
            <p class="page-title">2026 지구별 순위</p>
            <div class="standings-grid">${cards}</div>`;
    }

    // ── Leaderboard ────────────────────────────────────
    async function showLeaderboard() {

        setActiveNav('leaderboard');
        closeSidebar();

            <p class="page-title">스탯 리더보드</p>
            <div class="stat-tabs" style="margin-bottom:0;">
                <button class="stat-tab-btn active" id="ltab-hr"  onclick="switchLeaderTab('homeRuns','hitting','hr')">홈런</button>
                <button class="stat-tab-btn"         id="ltab-avg" onclick="switchLeaderTab('battingAverage','hitting','avg')">타율</button>
                <button class="stat-tab-btn"         id="ltab-rbi" onclick="switchLeaderTab('rbi','hitting','rbi')">타점</button>
                <button class="stat-tab-btn"         id="ltab-k"   onclick="switchLeaderTab('strikeouts','pitching','k')">탈삼진</button>

        switchLeaderTab('homeRuns', 'hitting', 'hr');
    }

    async function switchLeaderTab(stat, group, tabId) {
        document.querySelectorAll('[id^="ltab-"]').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`ltab-${tabId}`)?.classList.add('active');

        const content = document.getElementById('leader-content');
        if (!content) return;

        if (leaderCache[stat]) { renderLeaders(leaderCache[stat], stat); return; }

        content.innerHTML = `<div style="padding:24px; text-align:center;"><div class="spinner-border spinner-border-sm text-warning"></div></div>`;
        try {
            const r    = await fetch(`/api/leaders?stat=${stat}&group=${group}&limit=15`);
            const data = await r.json();
            leaderCache[stat] = data;
            renderLeaders(data, stat);
        } catch(e) {
            content.innerHTML = `<div style="padding:16px; color:var(--red);">불러오기 실패</div>`;
        }
    }

    function renderLeaders(leaders, stat) {
        const content = document.getElementById('leader-content');
        if (!content) return;
        const statLabel = { homeRuns:'홈런', battingAverage:'타율', rbi:'타점', strikeouts:'탈삼진', earnedRunAverage:'ERA' };
        const rankCls   = r => r === 1 ? 'gold' : r === 2 ? 'silver' : r === 3 ? 'bronze' : '';

        const rows = leaders.map(l => `
            <tr onclick="showPlayerStats(${l.playerId})">
                <td class="leader-rank ${rankCls(l.rank)}">${l.rank}</td>
                <td>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img src="https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_60,q_auto:best/v1/people/${l.playerId}/headshot/67/current"
                             width="32" height="32" style="border-radius:50%; object-fit:cover; object-position:top; background:var(--bg-card); flex-shrink:0;">
                        <div>
                            <div style="font-weight:600;">${l.koreanName || l.fullName}</div>
                            ${l.koreanName ? `<div style="font-size:0.7rem; color:var(--text-3);">${l.fullName}</div>` : ''}
                        </div>
                    </div>
                </td>
                <td>
                    <div style="display:flex; align-items:center; gap:6px;">
                        <img src="https://www.mlbstatic.com/team-logos/${l.teamId}.svg" width="16" height="16">
                        <span style="font-size:0.78rem; color:var(--text-2);">${l.teamName}</span>
                    </div>
                </td>
                <td class="leader-val">${l.value}</td>
            </tr>`).join('');

        content.innerHTML = `
            <div style="overflow-x:auto;">
                <table class="leader-table">
                    <thead><tr><th>#</th><th>선수</th><th>팀</th><th>${statLabel[stat] || stat}</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>`;
    }

    function showCompare() {

        closeSidebar();

        const opts = Object.values(allTeams)
            .sort((a, b) => a.name.localeCompare(b.name))
            .map(t => `<option value="${t.id}">${t.name}</option>`)
            .join('');

        display.innerHTML = `
            <p class="page-title">팀 비교</p>
            <div class="compare-select-row">
                <select class="compare-select" id="cmp-t1">${opts}</select>
                <span style="color:var(--text-3); font-weight:700; flex-shrink:0;">vs</span>
                <select class="compare-select" id="cmp-t2">${opts}</select>
                <button class="compare-btn" onclick="loadCompare()">비교하기</button>
            </div>
            <div id="compare-result">
                <p style="color:var(--text-3); font-size:0.85rem; text-align:center; padding:40px 0;">두 팀을 선택하고 비교하기를 눌러주세요.</p>
            </div>`;

    async function loadCompare() {
        const t1 = document.getElementById('cmp-t1')?.value;
        const t2 = document.getElementById('cmp-t2')?.value;
        const result = document.getElementById('compare-result');
        if (!t1 || !t2 || t1 === t2) {
            result.innerHTML = `<p style="color:var(--red); font-size:0.85rem;">서로 다른 두 팀을 선택해주세요.</p>`;
            return;
        }
        result.innerHTML = `<p style="color:var(--text-3); font-size:0.85rem; text-align:center; padding:32px 0;">불러오는 중...</p>`;

        try {
            const r    = await fetch(`/api/compare?team1=${t1}&team2=${t2}`);
            const data = await r.json();
            const team1 = allTeams[t1] || {};
            const team2 = allTeams[t2] || {};
            const h1 = data.team1.hitting  || {}, h2 = data.team2.hitting  || {};
            const p1 = data.team1.pitching || {}, p2 = data.team2.pitching || {};

            const mkRow = (label, v1, v2, higherBetter = true) => {
                const n1 = parseFloat(v1) || 0, n2 = parseFloat(v2) || 0;
                const total = n1 + n2;
                const pct1  = total > 0 ? (n1 / total * 100).toFixed(1) : 50;
                const pct2  = total > 0 ? (n2 / total * 100).toFixed(1) : 50;
                let c1 = '', c2 = '';
                if (n1 !== n2) {
                    const leftBetter = higherBetter ? n1 > n2 : n1 < n2;
                    c1 = leftBetter ? 'better' : 'worse';
                    c2 = leftBetter ? 'worse'  : 'better';
                }
                return `<div class="compare-row">
                    <span class="cmp-val left ${c1}">${v1 || '-'}</span>
                    <div class="cmp-bar-wrap">
                        <span class="cmp-bar-label">${label}</span>
                        <div class="cmp-bar-track">
                            <div class="cmp-bar-left"  style="width:${pct1}%"></div>
                            <div class="cmp-bar-right" style="width:${pct2}%"></div>
                        </div>
                    </div>
                    <span class="cmp-val right ${c2}">${v2 || '-'}</span>
                </div>`;
            };

            result.innerHTML = `
                <div class="compare-grid">
                    <div class="compare-team-header">
                        <div class="compare-header">
                            <img src="https://www.mlbstatic.com/team-logos/${t1}.svg" width="36" height="36">
                            <div class="compare-header-name">${team1.name || `Team ${t1}`}</div>
                        </div>
                        <div class="compare-header">
                            <img src="https://www.mlbstatic.com/team-logos/${t2}.svg" width="36" height="36">
                            <div class="compare-header-name">${team2.name || `Team ${t2}`}</div>
                        </div>
                    </div>
                    <div class="compare-section-label">⚾ 타격</div>
                    ${mkRow('팀 타율',  h1.avg,         h2.avg)}
                    ${mkRow('홈런',     h1.homeRuns,    h2.homeRuns)}
                    ${mkRow('타점',     h1.rbi,         h2.rbi)}
                    ${mkRow('득점',     h1.runs,        h2.runs)}
                    ${mkRow('안타',     h1.hits,        h2.hits)}
                    ${mkRow('OPS',      h1.ops,         h2.ops)}
                    ${mkRow('출루율',   h1.obp,         h2.obp)}
                    ${mkRow('장타율',   h1.slg,         h2.slg)}
                    ${mkRow('도루',     h1.stolenBases, h2.stolenBases)}
                    ${mkRow('삼진',     h1.strikeOuts,  h2.strikeOuts, false)}
                    <div class="compare-section-label">⚡ 투구</div>
                    ${mkRow('ERA',      p1.era,         p2.era,         false)}
                    ${mkRow('WHIP',     p1.whip,        p2.whip,        false)}
                    ${mkRow('탈삼진',   p1.strikeOuts,  p2.strikeOuts)}
                    ${mkRow('승',       p1.wins,        p2.wins)}
                    ${mkRow('세이브',   p1.saves,       p2.saves)}
                    ${mkRow('피홈런',   p1.homeRuns,    p2.homeRuns,    false)}
                    ${mkRow('볼넷 허용',p1.baseOnBalls, p2.baseOnBalls, false)}
                </div>`;
        } catch(e) {
            result.innerHTML = `<div style="color:var(--red);">데이터를 불러오지 못했습니다.</div>`;
        }
    }

    // ── Favorites ──────────────────────────────────────
    function getFavs()     { try { return JSON.parse(localStorage.getItem('mlb_favs') || '[]'); } catch { return []; } }
    function saveFavs(arr) { localStorage.setItem('mlb_favs', JSON.stringify(arr)); }
    function isFav(id)     { return getFavs().some(f => f.id === id); }

    function toggleFav(e, playerId, fullName, koreanName, teamId) {
        e.stopPropagation();
        const favs = getFavs();
        const idx  = favs.findIndex(f => f.id === playerId);
        if (idx >= 0) favs.splice(idx, 1);
        else favs.push({ id: playerId, fullName, koreanName, teamId });
        saveFavs(favs);
        renderFavorites();
        // 카드의 별 아이콘 업데이트
        document.querySelectorAll(`.star-btn[data-pid="${playerId}"]`).forEach(btn => {
            btn.classList.toggle('starred', idx < 0);
            btn.textContent = idx < 0 ? '★' : '☆';
        });
        // 프로필 버튼 업데이트
        const profBtn = document.getElementById('prof-fav-btn');
        if (profBtn && parseInt(profBtn.dataset.pid) === playerId) updateProfFavBtn(playerId);
    }

    function renderFavorites() {
        // 즐겨찾기 탭이 열려 있으면 목록 새로고침
        const isActive = document.querySelector('.sb-nav-btn[data-nav="favorites"]')?.classList.contains('active');
        if (isActive) showFavorites();
    }

    function showFavorites() {
        setActiveTeam(null);
        setActiveNav('favorites');
        closeSidebar();
        const display = document.getElementById('content-display');
        const favs    = getFavs();

        if (!favs.length) {
            display.innerHTML = `
                <p class="page-title">즐겨찾기</p>
                <p style="color:var(--text-3); text-align:center; padding:60px 0;">
                    즐겨찾기한 선수가 없습니다.<br>
                    <span style="font-size:0.8rem;">선수 카드의 ☆ 버튼으로 추가하세요.</span>
                </p>`;
            return;
        }

        const cards = favs.map(f => {
            const imgUrl = `https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_213,q_auto:best/v1/people/${f.id}/headshot/67/current`;
            const safeKo = (f.koreanName || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
            const safeFn = f.fullName.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
            const teamName = f.teamId ? (allTeams[f.teamId]?.teamName || '') : '';
            return `
                <div class="player-card" onclick="showPlayerStats(${f.id})">
                    <img src="${imgUrl}" class="player-card-img" alt="${f.fullName}">
                    <button class="star-btn starred" data-pid="${f.id}"
                        onclick="toggleFav(event,${f.id},'${safeFn}','${safeKo}',${f.teamId||0});">★</button>
                    <div class="player-card-body">
                        <div class="player-card-name">${f.koreanName || f.fullName}</div>
                        <p class="player-card-sub" style="font-size:0.65rem; opacity:0.6;">${f.fullName}</p>
                        ${f.teamId ? `<p class="player-card-sub" style="display:flex;align-items:center;gap:4px;">
                            <img src="https://www.mlbstatic.com/team-logos/${f.teamId}.svg" width="12" height="12">
                            ${teamName}
                        </p>` : ''}
                    </div>
                </div>`;
        }).join('');

        display.innerHTML = `
            <p class="page-title">즐겨찾기</p>
            <p style="color:var(--text-3); font-size:0.8rem; margin-bottom:18px;">${favs.length}명</p>
            <div class="player-grid">${cards}</div>`;
    }

    function updateProfFavBtn(playerId) {
        const btn = document.getElementById('prof-fav-btn');
        if (!btn) return;
        const starred = isFav(playerId);
        btn.classList.toggle('starred', starred);
        btn.textContent = starred ? '★ 즐겨찾기 해제' : '☆ 즐겨찾기';
    }

    // ── Position badge class helper ────────────────────
    function posClass(type) {
        return { 'Pitcher':'badge-pitcher', 'Catcher':'badge-catcher', 'Infielder':'badge-infielder',
                 'Outfielder':'badge-outfielder', 'Two-Way Player':'badge-twoway', 'Designated Hitter':'badge-dh' }[type] || '';
    }

    async function showTeamDetail(teamId) {
        currentTeamId = teamId;
        closeSidebar();
        setActiveTeam(teamId);
        setActiveNav(null);
        const display = document.getElementById('content-display');
        display.innerHTML = `<div class="player-grid">${[...Array(15)].map(() =>
            `<div class="skel" style="height:215px; border-radius:10px;"></div>`).join('')}</div>`;
        try {
            const res  = await fetch(`/api/roster/${teamId}`);
            const data = await res.json();
            const team = allTeams[teamId] || {};

            const cards = data.roster.map(item => {
                const p      = item.person;
                const imgUrl = `https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_213,q_auto:best/v1/people/${p.id}/headshot/67/current`;
                const ptype   = item.position.type || '';
                const bCls    = posClass(ptype);
                const starred = isFav(p.id);
                const safeKo  = (p.koreanName || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
                const safeFn  = p.fullName.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
                const isIL    = item.isIL || false;
                const ilBadge = isIL ? `<div class="il-badge">${item.ilLabel}</div>` : '';

                    ? `<p class="player-card-sub il-note">${item.ilNote || item.ilLabel}</p>`
                    : `<p class="player-card-sub">No.${item.jerseyNumber || '-'}</p>`;

                return `
                    <div class="player-card" data-pos-type="${ptype}" data-il="${isIL}"
                         style="${isIL ? 'display:none;' : ''}"
                         onclick="showPlayerStats(${p.id})">
                        <img src="${imgUrl}" class="player-card-img" alt="${p.fullName}">
                        ${ilBadge}
                        <div class="player-pos-badge ${bCls}">${item.position.abbreviation}</div>
                        <button class="star-btn ${starred ? 'starred' : ''}" data-pid="${p.id}"
                            onclick="toggleFav(event,${p.id},'${safeFn}','${safeKo}',${teamId})">${starred ? '★' : '☆'}</button>
                        <div class="player-card-body">
                            <div class="player-card-name">${p.koreanName || p.fullName}</div>
                            <p class="player-card-sub" style="font-size:0.65rem; opacity:0.6;">${p.fullName}</p>
                            ${cardSub}
                        </div>
                    </div>`;
            }).join('');

            display.innerHTML = `
                <div class="roster-top">
                    <button class="back-btn" onclick="showStandings()">← 순위표</button>
                    <img src="https://www.mlbstatic.com/team-logos/${teamId}.svg" width="46" height="46">
                    <div>
                        <div style="font-family:'Barlow Condensed',sans-serif; font-size:1.93rem; font-weight:700;">${team.name || '팀 로스터'}</div>
                        <div style="font-size:0.75rem; color:var(--text-3);">2026 Active Roster · ${data.roster.length}명</div>
                    </div>
                </div>
                <div class="filter-bar">
                    <button class="fpill active" data-filter="all"               onclick="filterRoster('all')">전체</button>
                    <button class="fpill"         data-filter="Pitcher"           onclick="filterRoster('Pitcher')">투수</button>
                    <button class="fpill"         data-filter="Catcher"           onclick="filterRoster('Catcher')">포수</button>
                    <button class="fpill"         data-filter="Infielder"         onclick="filterRoster('Infielder')">내야수</button>
                    <button class="fpill"         data-filter="Outfielder"        onclick="filterRoster('Outfielder')">외야수</button>
                    <button class="fpill"         data-filter="Designated Hitter" onclick="filterRoster('Designated Hitter')">지명타자</button>
                </div>
                <div class="player-grid">${cards}</div>`;
        } catch(e) {
            display.innerHTML = `<p style="color:var(--red);">로스터 정보를 불러오지 못했습니다.</p>`;
        }
    }

    function filterRoster(type) {
        document.querySelectorAll('.player-card').forEach(card => {
            const isIL   = card.dataset.il === 'true';
            const posType = card.dataset.posType;
            let show;
            if (type === 'IL')   show = isIL;
            else if (type === 'all') show = !isIL;
            else show = !isIL && posType === type;
            card.style.display = show ? '' : 'none';
        });
        document.querySelectorAll('.fpill').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.filter === type);
        });
    }

                        <div style="padding:20px; text-align:center; color:var(--text-3); font-size:0.82rem;">탭을 클릭하면 불러옵니다.</div>
                    </div>
                    <div id="tab-pane-recent" class="stat-tab-pane">
                        <div style="padding:20px; text-align:center; color:var(--text-3); font-size:0.82rem;">탭을 클릭하면 불러옵니다.</div>
                    </div>
                </div>`;
        } catch(e) { console.error(e); }
    }

    async function switchStatTab(tab, playerId, isPitcher, isTwoway = false) {
        ['season','career','recent'].forEach(t => {
            document.getElementById(`tab-${t}`)?.classList.toggle('active', t === tab);
            document.getElementById(`tab-pane-${t}`)?.classList.toggle('active', t === tab);
        });

        const key  = `${playerId}-${tab}`;
        if (tabLoaded[key]) return;
        const pane = document.getElementById(`tab-pane-${tab}`);

        if (tab === 'career') {
            pane.innerHTML = `<div style="padding:20px; text-align:center;"><div class="spinner-border spinner-border-sm text-warning"></div></div>`;
            try {
                const r    = await fetch(`/api/player/${playerId}/career`);
                const data = await r.json();
                const mkRows = (list) => list.map(item => `
                    <div class="stat-row">
                        <span class="stat-label">${item.Info}</span>
                        <span class="stat-val">${item.Record}</span>
                    </div>`).join('');
                pane.innerHTML = data.is_twoway ? `
                    <div class="twoway-grid">
                        <div class="twoway-col">
                            <div class="twoway-col-head bat-head">⚾ Batting</div>${mkRows(data.hitting_stats)}
                        </div>
                        <div class="twoway-col">
                            <div class="twoway-col-head pit-head">🎯 Pitching</div>${mkRows(data.pitching_stats)}
                        </div>
                    </div>` : mkRows(data.stats);
                tabLoaded[key] = true;
            } catch(e) {
                pane.innerHTML = `<div style="padding:16px; color:var(--red);">불러오기 실패</div>`;
            }

        } else if (tab === 'recent') {
            pane.innerHTML = `<div style="padding:20px; text-align:center;"><div class="spinner-border spinner-border-sm text-warning"></div></div>`;
            try {
                const r    = await fetch(`/api/player/${playerId}/gamelog`);
                const data = await r.json();
                if (!data.games?.length) {
                    pane.innerHTML = `<div style="padding:20px; text-align:center; color:var(--text-3); font-size:0.82rem;">데이터 없음</div>`;
                    tabLoaded[key] = true;
                    return;
                }

                // 테이블 생성
                const tblHead = isPitcher
                    ? `<tr><th>날짜</th><th>상대</th><th>이닝</th><th>ERA</th><th>탈삼진</th><th>볼넷</th><th>피안타</th></tr>`
                    : `<tr><th>날짜</th><th>상대</th><th>타수</th><th>안타</th><th>홈런</th><th>타점</th><th>타율</th></tr>`;
                const tblRows = data.games.map(g => isPitcher
                    ? `<tr><td>${g.date.slice(5)}</td><td>${g.opponent}</td><td>${g.inningsPitched}</td><td>${g.era}</td><td>${g.strikeOuts}</td><td>${g.baseOnBalls}</td><td>${g.hits}</td></tr>`
                    : `<tr><td>${g.date.slice(5)}</td><td>${g.opponent}</td><td>${g.atBats}</td><td>${g.hits}</td><td>${g.homeRuns}</td><td>${g.rbi}</td><td>${g.avg}</td></tr>`
                ).join('');
                pane.innerHTML = `
                    <div style="overflow-x:auto; margin-bottom:14px;">
                        <table class="gamelog-table"><thead>${tblHead}</thead><tbody>${tblRows}</tbody></table>
                    </div>
                    <div class="chart-container"><canvas id="recent-chart-canvas"></canvas></div>`;
                const ctx    = document.getElementById('recent-chart-canvas').getContext('2d');
                const labels = [...data.games].reverse().map(g => g.date.slice(5));

                const isLight = document.documentElement.dataset.theme === 'light';
                const gridClr = isLight ? 'rgba(0,0,0,0.06)' : 'rgba(255,255,255,0.05)';
                const tickClr = isLight ? '#57606a' : '#8b949e';

                let chartCfg;
                if (isPitcher) {
                    chartCfg = {
                        type: 'bar',
                        data: {
                            labels,
                            datasets: [{
                                label: '탈삼진',
                                data: [...data.games].reverse().map(g => g.strikeOuts),
                                backgroundColor: 'rgba(56,139,253,0.65)',
                                borderColor: 'rgba(56,139,253,1)',
                                borderWidth: 1,
                                yAxisID: 'y',
                            }, {
                                label: 'ERA',
                                data: [...data.games].reverse().map(g => parseFloat(g.era) || 0),
                                type: 'line',
                                borderColor: '#f85149',
                                backgroundColor: 'rgba(248,81,73,0.1)',
                                tension: 0.3,
                                pointRadius: 4,
                                yAxisID: 'y1',
                            }]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            scales: {
                                x: { ticks: { color: tickClr, font: { size: 10 } }, grid: { color: gridClr } },
                                y: { ticks: { color: tickClr }, grid: { color: gridClr }, beginAtZero: true,
                                     title: { display: true, text: 'K', color: '#388bfd', font: { size: 10 } } },
                                y1: { position: 'right', ticks: { color: '#f85149' }, grid: { drawOnChartArea: false },
                                      beginAtZero: true, title: { display: true, text: 'ERA', color: '#f85149', font: { size: 10 } } },
                            },
                            plugins: { legend: { labels: { color: tickClr, font: { size: 11 } } } }
                        }
                    };
                } else {
                    chartCfg = {
                        type: 'bar',
                        data: {
                            labels,
                            datasets: [{
                                label: '안타',
                                data: [...data.games].reverse().map(g => g.hits),
                                backgroundColor: 'rgba(245,166,35,0.7)',
                                borderColor: 'rgba(245,166,35,1)',
                                borderWidth: 1,
                            }, {
                                label: '홈런',
                                data: [...data.games].reverse().map(g => g.homeRuns),
                                backgroundColor: 'rgba(248,81,73,0.7)',
                                borderColor: 'rgba(248,81,73,1)',
                                borderWidth: 1,
                            }, {
                                label: '타점',
                                data: [...data.games].reverse().map(g => g.rbi),
                                backgroundColor: 'rgba(63,185,80,0.6)',
                                borderColor: 'rgba(63,185,80,1)',
                                borderWidth: 1,
                            }]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            scales: {
                                x: { ticks: { color: tickClr, font: { size: 10 } }, grid: { color: gridClr } },
                                y: { ticks: { color: tickClr }, grid: { color: gridClr }, beginAtZero: true },
                            },
                            plugins: { legend: { labels: { color: tickClr, font: { size: 11 } } } }
                        }
                    };
                }

                if (recentChartInst) { recentChartInst.destroy(); }
                recentChartInst = new Chart(ctx, chartCfg);
                tabLoaded[key] = true;
            } catch(e) {
                pane.innerHTML = `<div style="padding:16px; color:var(--red);">불러오기 실패</div>`;
            }
        }
    }

    function fmtHeight(h) {
        // "6' 2\"" → cm 변환
        if (!h) return '-';
        const m = h.match(/(\d+)'\s*(\d+)/);
        if (!m) return h;
        const cm = Math.round((parseInt(m[1]) * 12 + parseInt(m[2])) * 2.54);
        return `${cm}cm`;
    }
    function fmtWeight(w) {
        // 파운드(숫자) → kg
        if (!w) return '-';
        const kg = Math.round(parseInt(w) * 0.4536);
        return `${kg}kg`;
    }

    function goBack() {
        if (currentTeamId) showTeamDetail(currentTeamId);
        else showStandings();
    }
</script>
